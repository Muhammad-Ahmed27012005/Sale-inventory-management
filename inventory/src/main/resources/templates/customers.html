<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers | Smart Sales & Inventory</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand-lockup">
                <div class="brand-mark">SI</div>
                <div>
                    <h2>Smart Sales</h2><span>Inventory Suite</span>
                </div>
            </div>
            <nav class="nav-list">
                <a class="nav-link" href="/dashboard"><i data-lucide="layout-dashboard"></i>Dashboard</a>
                <a class="nav-link" href="/products"><i data-lucide="boxes"></i>Products</a>
                <a class="nav-link" href="/inventory"><i data-lucide="warehouse"></i>Inventory</a>
                <a class="nav-link" href="/sales"><i data-lucide="receipt"></i>Sales</a>
                <a class="nav-link" href="/customers"><i data-lucide="users"></i>Customers</a>
                <a class="nav-link" href="/reports"><i data-lucide="chart-column"></i>Reports</a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-pill" data-username></div>
                <button class="btn btn-ghost" type="button" data-logout><i data-lucide="log-out"></i>Logout</button>
            </div>
        </aside>

        <main class="main">
            <header class="page-header">
                <div>
                    <h1>Customers</h1>
                    <p>Manage customer information and purchase history</p>
                </div>
                <button id="openCustomerModal" class="btn btn-primary" type="button">
                    <i data-lucide="user-plus"></i>Add Customer
                </button>
            </header>

            <section class="card">
                <div class="section-title">
                    <h2>Customer Directory</h2>
                    <input id="customerSearch" class="search-input" type="search" placeholder="Search by name or phone...">
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr><th>ID</th><th>Name</th><th>Phone</th><th>Address</th><th>Actions</th></tr>
                        </thead>
                        <tbody id="customerTableBody"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Add Customer Modal -->
    <div id="customerModal" class="modal-backdrop">
        <div class="modal">
            <div class="modal-header">
                <h2>Add Customer</h2>
                <button class="btn btn-secondary btn-icon" type="button" data-modal-close="customerModal"><i data-lucide="x"></i></button>
            </div>
            <form id="customerForm">
                <div class="modal-body form-grid">
                    <div class="field full">
                        <label for="customerNameInput">Name *</label>
                        <input id="customerNameInput" type="text" required>
                    </div>
                    <div class="field">
                        <label for="customerPhoneInput">Phone</label>
                        <input id="customerPhoneInput" type="text">
                    </div>
                    <div class="field full">
                        <label for="customerAddressInput">Address</label>
                        <textarea id="customerAddressInput" rows="2"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" type="button" data-modal-close="customerModal">Cancel</button>
                    <button id="saveCustomerButton" class="btn btn-primary" type="submit"><i data-lucide="save"></i>Save</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Purchase History Modal -->
    <div id="historyModal" class="modal-backdrop">
        <div class="modal">
            <div class="modal-header">
                <h2 id="historyTitle">Purchase History</h2>
                <button class="btn btn-secondary btn-icon" type="button" data-modal-close="historyModal"><i data-lucide="x"></i></button>
            </div>
            <div class="modal-body">
                <div class="table-wrap">
                    <table>
                        <thead><tr><th>Invoice</th><th>Amount</th><th>Date</th></tr></thead>
                        <tbody id="historyTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/js/api.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/customers.js"></script>
</body>
</html>
