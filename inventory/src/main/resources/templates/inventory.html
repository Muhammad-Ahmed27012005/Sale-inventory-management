<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory | Smart Sales & Inventory</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand-lockup">
                <div class="brand-mark">SI</div>
                <div>
                    <h2>Smart Sales</h2><span>Inventory Suite</span>
                </div>
            </div>
            <nav class="nav-list">
                <a class="nav-link" href="/dashboard"><i data-lucide="layout-dashboard"></i>Dashboard</a>
                <a class="nav-link" href="/products"><i data-lucide="boxes"></i>Products</a>
                <a class="nav-link" href="/inventory"><i data-lucide="warehouse"></i>Inventory</a>
                <a class="nav-link" href="/sales"><i data-lucide="receipt"></i>Sales</a>
                <a class="nav-link" href="/customers"><i data-lucide="users"></i>Customers</a>
                <a class="nav-link" href="/reports"><i data-lucide="chart-column"></i>Reports</a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-pill" data-username></div><button class="btn btn-ghost" type="button" data-logout><i
                        data-lucide="log-out"></i>Logout</button>
            </div>
        </aside>

        <main class="main">
            <header class="page-header">
                <div>
                    <h1>Inventory</h1>
                    <p>Monitor stock levels and update product quantities.</p>
                </div>
                <div class="toolbar">
                    <button id="showAllStock" class="btn btn-primary" type="button"><i data-lucide="list"></i>All
                        Stock</button>
                    <button id="showLowStock" class="btn btn-secondary" type="button"><i
                            data-lucide="triangle-alert"></i>Low Stock</button>
                </div>
            </header>

            <section class="card">
                <div class="section-title">
                    <h2 id="inventoryTitle">Current Stock</h2>
                    <span class="muted" id="inventoryCount">0 items</span>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Product</th>
                                <th>Category</th>
                                <th>Price</th>
                                <th>Quantity</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryTableBody"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="stockModal" class="modal-backdrop">
        <div class="modal">
            <div class="modal-header">
                <h2>Update Stock</h2>
                <button class="btn btn-secondary btn-icon" type="button" data-modal-close="stockModal"
                    aria-label="Close"><i data-lucide="x"></i></button>
            </div>
            <form id="stockForm">
                <div class="modal-body form-grid">
                    <input id="stockProductId" type="hidden">
                    <div class="field full">
                        <label for="stockProductName">Product</label>
                        <input id="stockProductName" type="text" disabled>
                    </div>
                    <div class="field">
                        <label for="stockQuantity">Quantity</label>
                        <input id="stockQuantity" type="number" min="0" step="1" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" type="button" data-modal-close="stockModal">Cancel</button>
                    <button id="saveStockButton" class="btn btn-primary" type="submit"><i data-lucide="save"></i>Update
                        Stock</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/js/api.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/inventory.js"></script>
</body>

</html>
