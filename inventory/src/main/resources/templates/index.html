<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Smart Sales & Inventory</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body class="auth-page">
    <main class="auth-card">
        <div class="brand-lockup">
            <div class="brand-mark">SI</div>
            <div>
                <h1>Smart Sales &amp; Inventory</h1>
                <span>Business management console</span>
            </div>
        </div>

        <form id="loginForm" class="grid" novalidate>
            <div class="field">
                <label for="username">Username</label>
                <input id="username" name="username" type="text" autocomplete="username" required>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required>
            </div>
            <label class="checkbox-row">
                <input id="rememberMe" name="rememberMe" type="checkbox">
                Remember me
            </label>
        </button>
        <a class="btn btn-secondary" href="/signup">
            <i data-lucide="user-plus"></i>
            <span>Create Account</span>
        </a>
        <p id="loginMessage" class="muted" role="alert"></p>
            <button id="loginButton" class="btn btn-primary" type="submit">
                <i data-lucide="log-in"></i>
                <span>Login</span>
            </button>
            <p id="loginMessage" class="muted" role="alert"></p>
        </form>
    </main>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/js/api.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/login.js"></script>
</body>

</html>
